<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
      color: #f5f5f5;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: float 4s ease-in-out infinite;
    }

    h1 {
      font-size: 3rem;
      text-shadow: 2px 2px 5px #000;
    }

    p {
      font-size: 1.2rem;
      margin-top: 1rem;
      color: #ccc;
    }

    .planet {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle at 30% 30%, #ffcc70, #ff884d);
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(255, 136, 77, 0.7);
      margin: 0 auto 20px;
      animation: rotate 6s linear infinite;
    }

    .info-btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #ff884d;
      border: none;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 136, 77, 0.5);
      transition: background-color 0.3s ease;
    }

    .info-btn:hover {
      background-color: #ff6a1f;
    }

    .panel {
      margin-top: 20px;
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid #ccc;
      padding: 15px 20px;
      border-radius: 10px;
      display: none;
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="planet"></div>
    <h1>Coming Soon...</h1>
    <p>We're launching something awesome in space!</p>
    <button class="info-btn" onclick="togglePanel()">Temp Panel</button>
    <div class="panel" id="infoPanel">
      🚀 Stay tuned for our intergalactic launch!<br />
      Follow us on social media for updates.
    </div>
  </div>

  <script>
    function togglePanel() {
      const panel = document.getElementById('infoPanel');
      panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }
  </script>
</body>
</html>
