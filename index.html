<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: #f5f5f5;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .container {
      animation: float 4s ease-in-out infinite;
      max-width: 500px;
      width: 100%;
    }

    .planet {
      width: 160px;
      height: 160px;
      background: radial-gradient(circle at 30% 30%, #ffcc70, #ff884d);
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(255, 136, 77, 0.8);
      margin: 0 auto 30px;
      animation: rotate 8s linear infinite;
    }

    h1 {
      font-size: 3rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #ffffff;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
    }

    p {
      font-size: 1.1rem;
      margin-top: 0.5rem;
      color: #d1d1d1;
    }

    .info-btn {
      margin-top: 30px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 500;
      background-color: #ff884d;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(255, 136, 77, 0.4);
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .info-btn:hover {
      background-color: #ff6a1f;
      transform: translateY(-2px);
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <main class="container" role="main" aria-label="Coming Soon Section">
    <div class="planet" aria-hidden="true"></div>
    <h1>We're Launching Soon</h1>
    <p>Our official site is under development. Meanwhile, you can access the temporary panel below.</p>
    <a class="info-btn" href="https://jhw7k7-3000.csb.app/login" target="_blank" rel="noopener noreferrer">Visit Temp Panel</a>
  </main>
</body>
</html>
