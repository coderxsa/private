<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
      color: #f5f5f5;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: float 4s ease-in-out infinite;
    }

    h1 {
      font-size: 3rem;
      text-shadow: 2px 2px 5px #000;
    }

    p {
      font-size: 1.2rem;
      margin-top: 1rem;
      color: #ccc;
    }

    .planet {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle at 30% 30%, #ffcc70, #ff884d);
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(255, 136, 77, 0.7);
      margin: 0 auto 20px;
      animation: rotate 6s linear infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="planet"></div>
    <h1>Coming Soon...</h1>
    <p>We're launching something awesome in space!</p>
  </div>
</body>
</html>
